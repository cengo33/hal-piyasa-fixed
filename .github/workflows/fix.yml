name: Fix
on: push
jobs:
  fix:
      runs-on: ubuntu-latest
          steps:
                - uses: actions/checkout@v2
                      - run: |
                                git config user.name "github-actions"
                                          git config user.email "github-actions@github.com"
                                                    git rm --cached Agent-Reach || true
                                                              git commit -m "fix" || true
                                                                        git push
                                                                        
